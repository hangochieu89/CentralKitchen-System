# ============================================================
# application.properties - K?t n?i SQL Server
# File nŗy n?m ?: src/main/resources/application.properties
# ============================================================

# --- C?u hžnh Server ---
server.port=8080

# --- K?t n?i SQL Server ---
# Thay YOUR_SERVER_NAME b?ng tÍn mŠy ch? c?a b?n (VD: localhost\SQLEXPRESS)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CentralKitchenDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Noicom5509@
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate ---
# validate  = ki?m tra schema, KH‘NG t?o/s?a b?ng (dýng khi ?„ ců DB)
# update    = t? c?p nh?t b?ng n?u ců thay ??i entity
# create    = xůa vŗ t?o l?i b?ng m?i l?n ch?y (ch? dýng khi dev)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Jackson (JSON) ---
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
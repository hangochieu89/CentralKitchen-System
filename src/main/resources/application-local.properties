# Local in-memory H2 (entities use schema "dbo" like SQL Server)
# Tài khoản demo (LocalDemoDataSeeder): admin, manager1, coord1, coord2, kitchen1, kitchen2, store_q2, store_bt — mật khẩu: 123123
spring.datasource.url=jdbc:h2:mem:centralkitchen;DB_CLOSE_DELAY=-1;MODE=MSSQLServer;DATABASE_TO_LOWER=TRUE;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=dbo

spring.jpa.defer-datasource-initialization=false

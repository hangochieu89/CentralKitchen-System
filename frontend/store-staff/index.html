<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cửa hàng Franchise - Đặt hàng & Tồn kho</title>
    <link rel="stylesheet" href="../css/kitchen-staff-styles.css">
</head>
<body>
<header>
    <div class="brand">Store Management</div>
    <div class="user-chip"><span>Nhân viên Cửa hàng</span></div>
</header>

<main>
    <div class="page-header">
        <h1>Quản lý Cửa hàng</h1>
        <div class="actions">
            <button class="btn btn-primary" onclick="openOrderModal()">+ Tạo đơn đặt hàng mới</button>
        </div>
    </div>

    <section class="panel">
        <header class="panel-head"><h2>Danh sách đơn hàng đã đặt</h2></header>
        <div class="table-wrap">
            <table id="order-table">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Ngày đặt</th>
                        <th>Ngày nhận dự kiến</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>
</main>

<dialog id="dlg-order">
    <header><h3>Tạo đơn đặt hàng</h3></header>
    <div class="dialog-body">
        <div class="form-group">
            <label>Ngày mong muốn nhận</label>
            <input type="datetime-local" id="delivery-date">
        </div>
        <div class="form-group">
            <label>Ghi chú đơn hàng</label>
            <textarea id="order-note" placeholder="Ví dụ: Giao trước 8h sáng..." style="width: 100%; margin-top: 5px;"></textarea>
        </div>
        <hr>
        <h4>Chọn sản phẩm & Số lượng</h4>
        <div id="product-selection-list" style="max-height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px;"></div>
    </div>
    <footer>
        <button class="btn btn-secondary" onclick="document.getElementById('dlg-order').close()">Hủy</button>
        <button class="btn btn-primary" onclick="submitOrder()">Gửi đơn hàng</button>
    </footer>
</dialog>

<dialog id="dlg-detail">
    <header><h3>Chi tiết đơn hàng <span id="detail-order-id"></span></h3></header>
    <div class="dialog-body">
        <p><strong>Trạng thái:</strong> <span id="detail-status"></span></p>
        <p><strong>Ngày đặt:</strong> <span id="detail-date"></span></p>
        <table class="table-mini" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead>
                <tr style="background: #f4f4f4; text-align: left;">
                    <th style="padding: 8px; border: 1px solid #ddd;">Sản phẩm</th>
                    <th style="padding: 8px; border: 1px solid #ddd;">Số lượng</th>
                    <th style="padding: 8px; border: 1px solid #ddd;">Đơn vị</th>
                </tr>
            </thead>
            <tbody id="detail-items-body"></tbody>
        </table>
    </div>
    <footer>
        <button class="btn btn-secondary" onclick="document.getElementById('dlg-detail').close()">Đóng</button>
    </footer>
</dialog>

<dialog id="dlg-feedback">
    <header><h3>Đánh giá chất lượng đơn hàng</h3></header>
    <div class="dialog-body">
        <input type="hidden" id="fb-order-id">
        <div class="form-group">
            <label>Mức độ hài lòng (1-5 sao)</label>
            <select id="fb-rating" style="width: 100%; padding: 8px;">
                <option value="5">⭐⭐⭐⭐⭐ Rất tốt</option>
                <option value="4">⭐⭐⭐⭐ Tốt</option>
                <option value="3">⭐⭐⭐ Tạm được</option>
                <option value="2">⭐⭐ Kém</option>
                <option value="1">⭐ Rất tệ</option>
            </select>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label>Ý kiến phản hồi</label>
            <textarea id="fb-comment" placeholder="Nhập nhận xét về sản phẩm, đóng gói..." style="width: 100%; min-height: 80px;"></textarea>
        </div>
    </div>
    <footer>
        <button class="btn btn-secondary" onclick="document.getElementById('dlg-feedback').close()">Hủy</button>
        <button class="btn btn-primary" onclick="submitFeedback()">Gửi đánh giá</button>
    </footer>
</dialog>

<script>
    const STORE_ID = 2;
    const USER_ID = 7;

    //Tải danh sách đơn hàng
    async function loadOrders() {
        try {
            const response = await fetch(`/api/store-staff/orders/${STORE_ID}`);
            const orders = await response.json();
            const tbody = document.querySelector("#order-table tbody");
            
            tbody.innerHTML = orders.map(o => `
                <tr>
                    <td>#ORD-${o.id}</td>
                    <td>${new Date(o.orderDate).toLocaleString()}</td>
                    <td>${o.deliveryDate ? new Date(o.deliveryDate).toLocaleDateString() : '-'}</td>
                    <td><span class="badge badge-status-${o.status.toLowerCase()}">${o.status}</span></td>
                    <td>
                        <button class="btn btn-sm" onclick="viewDetail(${o.id})">Chi tiết</button>
                        ${o.status === 'DELIVERED' ? `<button class="btn btn-sm btn-primary" style="margin-left:5px" onclick="openFeedback(${o.id})">Đánh giá</button>` : ''}
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error("Lỗi tải đơn hàng:", error);
        }
    }

    //Mở Modal đặt hàng
    async function openOrderModal() {
        try {
            const response = await fetch('/api/store-staff/products');
            const products = await response.json();
            const list = document.getElementById('product-selection-list');
            
            list.innerHTML = products.map(p => `
                <div class="product-item" style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
                    <span><strong>${p.name}</strong> (${p.unit})</span>
                    <input type="number" class="prod-qty" data-id="${p.id}" placeholder="SL" style="width: 70px;" min="0">
                </div>
            `).join('');
            
            document.getElementById('dlg-order').showModal();
        } catch (error) {
            alert("Không thể tải danh sách sản phẩm.");
        }
    }

    //Gửi đơn hàng
    async function submitOrder() {
        const items = [];
        document.querySelectorAll('.prod-qty').forEach(input => {
            const qty = parseFloat(input.value);
            if (qty > 0) {
                items.push({
                    productId: parseInt(input.dataset.id),
                    quantity: qty,
                    note: ""
                });
            }
        });

        if (items.length === 0) {
            alert("Vui lòng nhập số lượng cho ít nhất một sản phẩm!");
            return;
        }

        const data = {
            storeId: STORE_ID,
            userId: USER_ID,
            deliveryDate: document.getElementById('delivery-date').value,
            note: document.getElementById('order-note').value,
            items: items
        };

        const response = await fetch('/api/store-staff/orders', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if(response.ok) {
            alert("Đặt hàng thành công!");
            document.getElementById('dlg-order').close();
            loadOrders();
        } else {
            alert("Gửi đơn hàng thất bại.");
        }
    }

    //Xem chi tiết
    async function viewDetail(orderId) {
        const response = await fetch(`/api/store-staff/orders/detail/${orderId}`);
        const data = await response.json();

        document.getElementById('detail-order-id').innerText = `#ORD-${data.id}`;
        document.getElementById('detail-status').innerText = data.status;
        document.getElementById('detail-date').innerText = new Date(data.orderDate).toLocaleString();

        const tbody = document.getElementById('detail-items-body');
        tbody.innerHTML = data.items.map(item => `
            <tr>
                <td style="padding: 8px; border: 1px solid #ddd;">${item.productName}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${item.quantity}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${item.productUnit}</td>
            </tr>
        `).join('');

        document.getElementById('dlg-detail').showModal();
    }

    // Đánh giá 
    function openFeedback(orderId) {
        document.getElementById('fb-order-id').value = orderId;
        document.getElementById('fb-comment').value = "";
        document.getElementById('dlg-feedback').showModal();
    }

    async function submitFeedback() {
        const orderId = document.getElementById('fb-order-id').value;
        const rating = document.getElementById('fb-rating').value;
        const comment = document.getElementById('fb-comment').value;

        const response = await fetch('/api/store-staff/feedback', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                delivery: { id: orderId },
                submittedBy: { id: USER_ID },
                rating: parseInt(rating),
                comment: comment
            })
        });

        if(response.ok) {
            alert("Cảm ơn bạn đã phản hồi!");
            document.getElementById('dlg-feedback').close();
        } else {
            alert("Không thể gửi phản hồi.");
        }
    }

    window.onload = loadOrders;
</script>
</body>
</html>
